# ── Deploy DocFlow Backend → Azure App Service (Docker) ─────────────────
# Se ejecuta en cada push a main. Construye la imagen Docker del backend
# y la despliega en Azure App Service usando Container Registry.
#
# Requiere los siguientes secrets en GitHub:
#   AZURE_CREDENTIALS          → JSON de un Service Principal con acceso al ACR y App Service
#   REGISTRY_LOGIN_SERVER      → Ej: docflowreg.azurecr.io
#   REGISTRY_USERNAME          → Username del ACR
#   REGISTRY_PASSWORD          → Password del ACR
#   AZURE_WEBAPP_NAME          → Nombre del App Service (ej: docflow-api)

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: docflow-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
