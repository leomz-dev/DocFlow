# ── Deploy DocFlow Backend → Azure App Service (Docker) ─────────────────
# Se ejecuta en cada push a main o manualmente. 
#
# Requiere los siguientes secrets en GitHub:
#   AZURE_REGISTRY_LOGIN_SERVER → Ej: docflowreg.azurecr.io
#   AZURE_REGISTRY_USERNAME     → Username del ACR
#   AZURE_REGISTRY_PASSWORD     → Password del ACR
#   AZURE_WEBAPP_PUBLISH_PROFILE → Contenido del archivo .PublishSettings

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: docflow-api
  IMAGE_NAME: docflow-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

