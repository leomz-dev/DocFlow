# ── Deploy DocFlow Frontend → Azure Static Web Apps ─────────────────────
# Se ejecuta en cada push a main. Compila el cliente React/Vite y lo sube
# a Azure Static Web Apps (CDN global, HTTPS, gratis para estudiantes).
#
# Requiere el secret: AZURE_STATIC_WEB_APPS_API_TOKEN
# (Lo genera Azure al crear el Static Web App y conectar el repo)

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # ── Rutas del monorepo ──
          app_location: "/client"
          output_location: "dist"

        env:
          # Variables de entorno que Vite necesita en build time
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
